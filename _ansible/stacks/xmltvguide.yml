xmltvguide:
  services:
  - name: wfhdiary
    image: ghcr.io/acbgbca/xmltvguide:latest
    exposed:
      internal: true
      external: true
      port: 8080
    user: '{{ userId }}:{{ groupId }}'
    env:
      XMLTV_URL: "http://xmltv.net/xml_files/Melbourne.xml"
      TZ: "Australia/Melbourne"
    volumes:
      - local: data # Local directory, backed up
        container: /data
