services:
  beets:
    image: lscr.io/linuxserver/beets:2.8.0@sha256:eafa896e54703848deacce1d1fbe4bc7d0b831a93153fef4806ba0084407dbc1
    container_name: beets
    user: 9001:9001
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.beets.loadbalancer.server.port=8337
      - show.external=true
    environment:
      TZ: "Australia/Melbourne"
    volumes:
      - ./config:/config
      - /mnt/data8tb/music_tagged:/music
      - /mnt/data8tb/downloads:/downloads
      - /mnt/data8tb/music_untagged:/untagged
  slskd:
    image: slskd/slskd:0.24.5@sha256:17ef977563be206f3b5932080b1e23883b2cb39dc9010640f6f39b4eaec887e3
    container_name: slskd
    user: 9001:9001
    restart: unless-stopped
    ports:
      - 50300:50300
    labels:
      - traefik.enable=true
      - traefik.http.services.slskd.loadbalancer.server.port=5030
      - show.external=true
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ./slskd:/app
      - /mnt/data8tb/music_untagged:/downloads

networks:
  default:
    external: true
    name: ctr-network
