---
services:
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: prometheus
    user: "9001:9001"
    labels:
      - traefik.enable=true
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    volumes:
      - ./etc:/etc/prometheus
      - /mnt/ssd512/ctr_data/prometheus/data:/prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=45d"
    security_opt:
      - no-new-privileges:true
    depends_on:
      - cadvisor
  alertmanager:
    image: prom/alertmanager:v0.33.0@sha256:af26fbe4dd1886ac0efd7bd55cd9027da262e105b137a376522b7c14c3626e4a
    container_name: alertmanager
    labels:
      - traefik.enable=true
      - traefik.http.services.alertmanager.loadbalancer.server.port=9093
    volumes:
      - ./alertmanager.yml:/etc/alertmanager.yml
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager.yml"
    security_opt:
      - no-new-privileges:true
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--disable_metrics=percpu,hugetlb,sched,tcp,udp,disk,referenced_memory,advtcp'
      - '--store_container_labels=false'
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1@sha256:0f422f62c15f154af8d8572b23d623aebfb10cec73a5c654d18f911f3f9df241
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'
networks:
  default:
    external: true
    name: ctr-network