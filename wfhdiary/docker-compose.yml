services:
  wfhdiary:
    image: ghcr.io/acbgbca/ato-wfh-diary:latest@sha256:2d9d516a228bf2149d0948c7d33315099f8eced11c9c1997d3a2bd74cf2bb44b
    container_name: wfhdiary
    user: 9001:9001
    restart: unless-stopped
    environment:
      - FORWARD_AUTH_HEADER=Remote-User
    labels:
      - traefik.enable=true
      - traefik.http.services.wfhdiary.loadbalancer.server.port=8080
      - show.external=true
    volumes:
      - ./data:/data

networks:
  default:
    external: true
    name: ctr-network
