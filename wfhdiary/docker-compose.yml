services:
  wfhdiary:
    image: ghcr.io/acbgbca/ato-wfh-diary:latest@sha256:1396663ffeee28e7ac70358ca07f4e386778de3f14bea259c807a5c698f49d08
    container_name: wfhdiary
    user: 9001:9001
    restart: unless-stopped
    environment:
      - FORWARD_AUTH_HEADER=Remote-User
    labels:
      - traefik.enable=true
      - traefik.http.services.wfhdiary.loadbalancer.server.port=8080
      - show.external=true
    volumes:
      - ./data:/data

networks:
  default:
    external: true
    name: ctr-network
