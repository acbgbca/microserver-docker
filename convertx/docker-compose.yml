services:
  convertx: 
    image: ghcr.io/c4illin/convertx:v0.18.0@sha256:b515b04bfd25298a5cdc775b2fcd48b9399bab658ce13e2598b65df1b16098c8
    labels:
      - traefik.enable=true
      - traefik.http.services.convertx.loadbalancer.server.port=3000
      - show.external=true
    container_name: convertx
    user: 9001:9001
    restart: unless-stopped
    environment:
      - HTTP_ALLOWED=true
      - ALLOW_UNAUTHENTICATED=true
    volumes:
      - ./data:/app/data
networks:
  default:
    external: true
    name: ctr-network