services:
  convertx: 
    image: ghcr.io/c4illin/convertx:v0.17.0@sha256:e1f85be04bbaf8a55ead9261194c3ae0fa0957d303ea537127154860b2552afd
    labels:
      - traefik.enable=true
      - traefik.http.services.convertx.loadbalancer.server.port=3000
      - show.external=true
    container_name: convertx
    user: 9001:9001
    restart: unless-stopped
    environment:
      - HTTP_ALLOWED=true
      - ALLOW_UNAUTHENTICATED=true
    volumes:
      - ./data:/app/data
networks:
  default:
    external: true
    name: ctr-network