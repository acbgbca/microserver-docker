---
services:
  smtprelay:
    image: grafana/smtprelay:2.5.3@sha256:eadbd9a155b41f93746020bbcfabbc73670e73bf97c6420f06d09f00b792471e
    container_name: smtprelay
    hostname: smtprelay
    ports:
      - 2025:25
    command: -config=/smtprelay.ini
    volumes:
      - ./smtprelay.ini:/smtprelay.ini:ro
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network
