---
services:
  smtprelay:
    image: grafana/smtprelay:2.5.1@sha256:29916b72ae0e55cf198511fad46e08b54c8b9a6baef3b04f7df2c7ee98405f55
    container_name: smtprelay
    hostname: smtprelay
    ports:
      - 2025:25
    command: -config=/smtprelay.ini
    volumes:
      - ./smtprelay.ini:/smtprelay.ini:ro
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network
