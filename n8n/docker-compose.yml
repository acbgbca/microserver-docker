services:
  n8n:
    image: ghcr.io/n8n-io/n8n:2.25.4@sha256:5fd37fff98273a00c14f88d36b78a961f822e700801fa1b9509a7af643354531
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network