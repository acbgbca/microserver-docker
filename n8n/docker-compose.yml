services:
  n8n:
    image: ghcr.io/n8n-io/n8n:1.123.36@sha256:c8d74bf33b36d76cfeb9b4fbb55f0b45396c51956100a41db40e8dd1fc72edad
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network