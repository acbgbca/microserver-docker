services:
  n8n:
    image: ghcr.io/n8n-io/n8n:1.123.34@sha256:053b7cb846656d69b9fdd3dab538de29d5203b06f41d77fac5367b9ec8988f92
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network