services:
  n8n:
    image: ghcr.io/n8n-io/n8n:1.123.28@sha256:f71b38c2dd5eea428306f5a9e473bfb280d834e304735911f73fdf55e3115069
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network