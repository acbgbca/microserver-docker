services:
  n8n:
    image: ghcr.io/n8n-io/n8n:1.123.35@sha256:457667a37b7da9e3eb1b84168a9314253212def5cac1e3790053ef977566084d
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network