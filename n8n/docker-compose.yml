services:
  n8n:
    image: ghcr.io/n8n-io/n8n:1.123.25@sha256:034f6fb8eb3ad55224cda836f6ebc63d727b4dcf34746f4d05794830474d21ce
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network