services:
  n8n:
    image: ghcr.io/n8n-io/n8n:1.123.38@sha256:237079c34a18939505499e130bc68739e8e7654059177def76162def7ae43e3e
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network