services:
  n8n:
    image: ghcr.io/n8n-io/n8n:2.32.4@sha256:8bebf4359041e8083fbb38145f03657614b4b0d1b83de7bd3dd300b460a610dc
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network