services:
  n8n:
    image: ghcr.io/n8n-io/n8n:2.32.3@sha256:c848162d17a99af20792358e4b075658ad00a80301419415305d66d10888d3f2
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network