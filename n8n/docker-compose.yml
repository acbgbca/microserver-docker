services:
  n8n:
    image: ghcr.io/n8n-io/n8n:2.25.3@sha256:3dacc8d43fa736ecfc38582aa82e88212b65be484edac2396fcd7b3d2334d41f
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network