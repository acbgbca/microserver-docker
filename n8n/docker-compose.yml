services:
  n8n:
    image: ghcr.io/n8n-io/n8n:1.123.31@sha256:942c483f086b44a6ce560e6a30ac82d5a5f5e69b9b62a51f22693850483a4c88
    container_name: n8n
    labels:
      - traefik.enable=true
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - show.external=true
    env_file:
      - n8n.env
    volumes:
      - ./data:/home/node/.n8n
    restart: 'unless-stopped'
networks:
  default:
    external: true
    name: ctr-network