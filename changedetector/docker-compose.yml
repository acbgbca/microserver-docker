services:
  changedetector:
    image: ghcr.io/dgtlmoon/changedetection.io:latest@sha256:7611738e564caa08a9b7591a7909e4f6c78d34d289873b9fd7d320af50943419
    container_name: changedetector
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.changedetector.loadbalancer.server.port=5000
      - show.external=true
    volumes:
      - ./data:/datastore
    environment:
      - PUID=9001
      - PGID=9001
      - USE_X_SETTINGS=1

networks:
  default:
    external: true
    name: ctr-network
