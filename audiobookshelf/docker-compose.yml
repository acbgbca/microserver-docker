services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.33.2@sha256:a44ed89b3e845faa1f7d353f2cc89b2fcd8011737dd14075fa963cf9468da3a5
    container_name: audiobookshelf
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.audiobookshelf.loadbalancer.server.port=80
      - show.external=true
      - sablier.enable=true
      - sablier.group=audiobookshelf
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - '/mnt/data8tb/onedrive/calibre/books:/books:ro'
      - ./podcasts:/podcasts
      - ./config:/config
      - ./metadata:/metadata
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"
      interval: 2m
      timeout: 30s
      retries: 5
      start_period: 30s
      start_interval: 5s

networks:
  default:
    external: true
    name: ctr-network
