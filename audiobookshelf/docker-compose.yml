services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.35.0@sha256:89276ff2e0b3d2f07dd334b641f27a34ab7f02e1047c60b7b8a30126cb0813a5
    container_name: audiobookshelf
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.audiobookshelf.loadbalancer.server.port=80
      - show.external=true
      - sablier.enable=true
      - sablier.group=audiobookshelf
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - '/mnt/data8tb/onedrive/calibre/books:/books:ro'
      - ./podcasts:/podcasts
      - ./config:/config
      - ./metadata:/metadata
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"
      interval: 2m
      timeout: 30s
      retries: 5
      start_period: 30s
      start_interval: 5s

networks:
  default:
    external: true
    name: ctr-network
