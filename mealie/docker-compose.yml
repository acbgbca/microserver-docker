services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.19.1@sha256:67472993a2edb2378e92fd84a59b8b2db5f3dc0fa93d7b8e31a2f205372cfc07
    container_name: mealie
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.mealie.loadbalancer.server.port=9000
      - show.external=true
    env_file:
      - mealie.env
    volumes:
      - ./data:/app/data/

networks:
  default:
    external: true
    name: ctr-network
