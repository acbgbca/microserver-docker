---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.32.2@sha256:b82e1a0b2db180b20ddcdc5a8b64d2d3bee5dcf0bbec164c7bcf1c00fc1c6bbc
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true