---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.23.1@sha256:f521e23b8176f53787857a2167caefc4d8b391a39c60aaadf4d820063ae4dcf7
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true