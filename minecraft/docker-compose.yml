---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.33.1@sha256:f3146d7f0394cdf021fb71e3e948a189cd846841fe46eb374fad76fa4415fa8f
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true