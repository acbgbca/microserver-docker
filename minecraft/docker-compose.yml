---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.13.1@sha256:f3f7506f3e2e8bdb9d30ac7b83f6d8b651134a72610d0324f254807307db3260
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true