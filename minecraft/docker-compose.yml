---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.21.1@sha256:bd5425031285df10e75c0840bb0d32d83feb4f6a002dfef189e8172e5a1b2d53
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true