---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.34.3@sha256:a8572aa7f0b3ee2efe426f8929ed4e35ba743e51d5e93f7a68097d22bc656a12
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true