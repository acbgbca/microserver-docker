---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.21.124.2@sha256:410d41fad78ec8b4f55c452a46593d44346df8eec047a2d8ebb201bacc9c44f6
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true