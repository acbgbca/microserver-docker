---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.20.5@sha256:0915f91a74bc47150f54765c6e042b3fc6dd40cdef56362885648b3361687262
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true