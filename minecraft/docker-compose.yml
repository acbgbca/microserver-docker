---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.14.1@sha256:c795478087368ac3b3608e8e17e85597f8d5d388415796a11efa38c4a9e4ef47
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true