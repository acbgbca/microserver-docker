---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.30.5@sha256:5ccd007feb6092225db460e13985342bd87b5a746b9c42dc457b82ec67fe0fad
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true