---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.20.5@sha256:0c35b9094de10596a0ecb4d4b9a0dd17fa588733c28d770f9666a1b65d8bd9c7
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true