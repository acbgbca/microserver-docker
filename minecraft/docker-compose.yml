---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.32.2@sha256:b62157a9c363aa5cbc0a7d188fc619c8b0708ee83db4f05caf779fd71974ccc5
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true