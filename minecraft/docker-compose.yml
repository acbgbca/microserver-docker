---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.31.1@sha256:1e7554651dcacb9d730e1e3e74f4d9f6952af0d7cf7f4714c8e3c0a1cccea967
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true