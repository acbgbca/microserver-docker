---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.11.1@sha256:3be633bddfc7722a6fcb3e71519da7dec944581d901e8698714f6fbd3b2a8c3d
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true