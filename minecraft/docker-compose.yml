---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.14.1@sha256:f49048d66cc9ed27584eaefaab238a94366a75bf97a7445e7f1c10c704ec3c65
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true