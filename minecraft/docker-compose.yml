---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.23.1@sha256:ff58963927f414bff5eecb4276fed481e8d8981b16da9d9334c412626b37a7e3
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true