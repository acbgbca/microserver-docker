---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.33.2@sha256:be1d7784d262160a4530ec3ed587224b94472a564dc6aefa577ee2588596b432
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true