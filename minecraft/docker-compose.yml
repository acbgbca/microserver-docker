---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.33.2@sha256:17aa851ef7c26af9774980bbdfbc5c14ec1d18bc18a1c8f5856c53b378afebae
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true