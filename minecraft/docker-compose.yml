---
services:
  minecraft:
    image: ghcr.io/acbgbca/minecraft-bedrock:1.26.23.1@sha256:64d0fbb63bfae4425c343f1a560087dd8d7b7fa4b0633c6893a6b1f421e572d5
    container_name: minecraft
    environment:
      - UID=9001
      - GID=9001
      - EULA=TRUE
    volumes:
      - ./config:/config
      - ./worlds:/worlds
    security_opt:
      - no-new-privileges:true
    restart: 'unless-stopped'
    networks:
      default:
          ipv4_address: 192.168.94.70
networks:
  default:
    name: lan-network
    external: true