services:
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest@sha256:f6dc6d9246cd8e02cc8c4a342eabe6dd63cad402ba43cd00b91a14e7e31fe470
    container_name: tdarr
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.tdarr.loadbalancer.server.port=8265
      - show.external=true
    environment:
      - TZ=Australia/Melbourne
      - PUID=9001
      - PGID=9001
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./config:/app/server
      - ./server:/app/configs
      - ./logs:/app/logs
      - /mnt/data8tb/videos:/media
      - /tmp/tdarr:/temp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  default:
    external: true
    name: ctr-network
