services:
  xmltvguide:
    image: ghcr.io/acbgbca/xmltvguide:latest@sha256:8470ead7314dc2f53ea9734e5a901557e46786acc89972b25755e9c734eec482
    container_name: xmltvguide
    user: 9001:9001
    restart: unless-stopped
    environment:
      XMLTV_URL: "http://xmltv.net/xml_files/Melbourne.xml"
      TZ: "Australia/Melbourne"
      HIDDEN_CHANNELS: "16,17,34,36,44,77,78,200,201,301,302"
      CHANNEL_NAME_STRIP: "Melbourne,Victoria,VIC"
    labels:
      - traefik.enable=true
      - traefik.http.services.xmltvguide.loadbalancer.server.port=8080
      - show.external=true
    volumes:
      - ./data:/data

networks:
  default:
    external: true
    name: ctr-network
