services:
  xmltvguide:
    image: ghcr.io/acbgbca/xmltvguide:latest@sha256:2813f4dff2d70fa7be1edc72127c7093efe0e7ca7f34bac9c2e036408cdcbc4d
    container_name: xmltvguide
    user: 9001:9001
    restart: unless-stopped
    environment:
      XMLTV_URL: "http://xmltv.net/xml_files/Melbourne.xml"
      TZ: "Australia/Melbourne"
      HIDDEN_CHANNELS: "16,17,34,36,44,77,78,200,201,301,302"
      CHANNEL_NAME_STRIP: "Melbourne,Victoria"
    labels:
      - traefik.enable=true
      - traefik.http.services.xmltvguide.loadbalancer.server.port=8080
      - show.external=true
    volumes:
      - ./data:/data

networks:
  default:
    external: true
    name: ctr-network
