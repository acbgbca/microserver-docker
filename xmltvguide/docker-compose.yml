services:
  xmltvguide:
    image: ghcr.io/acbgbca/xmltvguide:latest@sha256:adac70e26c05e177007cf34609590b7259cea15fcd90fc42d3c477835a43d24f
    container_name: xmltvguide
    user: 9001:9001
    restart: unless-stopped
    environment:
      XMLTV_URL: "http://xmltv.net/xml_files/Melbourne.xml"
      TZ: "Australia/Melbourne"
      HIDDEN_CHANNELS: "16,17,34,36,44,77,78,200,201,301,302"
      CHANNEL_NAME_STRIP: "Melbourne,Victoria,VIC"
    labels:
      - traefik.enable=true
      - traefik.http.services.xmltvguide.loadbalancer.server.port=8080
      - show.external=true
    volumes:
      - ./data:/data

networks:
  default:
    external: true
    name: ctr-network
