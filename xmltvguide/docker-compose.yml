services:
  xmltvguide:
    image: ghcr.io/acbgbca/xmltvguide:latest@sha256:d2c63a69d8bb076b7c1e348d85a2848c7f7ad81bedb9ea3009f4e2e9033c3056
    container_name: xmltvguide
    user: 9001:9001
    restart: unless-stopped
    environment:
      XMLTV_URL: "http://xmltv.net/xml_files/Melbourne.xml"
      TZ: "Australia/Melbourne"
    labels:
      - traefik.enable=true
      - traefik.http.services.xmltvguide.loadbalancer.server.port=8080
      - show.external=true
    volumes:
      - ./data:/data

networks:
  default:
    external: true
    name: ctr-network
