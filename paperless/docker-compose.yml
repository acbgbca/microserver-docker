
# To upgrade the database, see https://acbgbca.github.io/documentation/postgres/
services:
  db18:
    image: postgres:18.4@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
    restart: unless-stopped
    volumes:
      - ./pgdata18:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    labels:
      - sablier.enable=true
      - sablier.group=paperless

  broker:
    image: redis:8.6.3@sha256:4d25e2fe601f7ffaeb4437cb6ced3518bc36edf34ebe98863c80836943d94529
    restart: unless-stopped
    volumes:
      - ./redisdata:/data
    labels:
      - sablier.enable=true
      - sablier.group=paperless

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
    container_name: paperless
    restart: unless-stopped
    # user: 9001:9001
    labels:
      - traefik.enable=true
      - traefik.http.services.paperless.loadbalancer.server.port=8000
      - show.external=true
      - sablier.enable=true
      - sablier.group=paperless
    depends_on:
      - db18
      - broker
      - gotenberg
      - tika
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "2", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./data:/usr/src/paperless/data
      - /mnt/data8tb/onedrive/paperless/media:/usr/src/paperless/media
      - /mnt/data8tb/onedrive/paperless/export:/usr/src/paperless/export
      - /mnt/data8tb/onedrive/paperless/consume:/usr/src/paperless/consume
    env_file: docker-compose.env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db18
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.32@sha256:a40c5a46b79d812ce2f5e139278163142a054050bfd1e5f162da36d3d11c7138
    restart: unless-stopped
    labels:
      - sablier.enable=true
      - sablier.group=paperless
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  tika:
    image: docker.io/apache/tika:3.3.0.0@sha256:2a565f1ea1290bdcb74a7d35957d16a989ed44ef98790dcdcc28121d728fa583
    restart: unless-stopped
    labels:
      - sablier.enable=true
      - sablier.group=paperless

networks:
  default:
    external: true
    name: ctr-network
