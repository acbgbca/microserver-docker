
name: immich

services:
  immich:
    container_name: immich
    image: ghcr.io/immich-app/immich-server:v2.7.4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /mnt/data8tb/pictures/family:/photos:ro
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.services.immich.loadbalancer.server.port=2283
      - show.external=true
    depends_on:
      - redis
      - database
    restart: unless-stopped
    networks:
      - default
      - ctrnetwork
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.4-cuda@sha256:38e5db5a7c65ec822b7a18d2ece4c49c913e15b7eb35f11515889e7720e00518
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    volumes:
      - /mnt/ssd512/ctr_data/immich/model_cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - ctrnetwork
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    volumes:
      - ./redis:/data	
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ./postgres14:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    healthcheck:
      disable: false

networks:
  default:
    name: immich-network
    internal: true
  ctrnetwork:
    external: true
    name: ctr-network
